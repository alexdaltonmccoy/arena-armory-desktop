# Builds the Windows installer and attaches it to a GitHub Release whenever a
# version tag (v1.2.3) is pushed. The tag must match the version in
# package.json (electron-builder names the release after package.json).
#
# The site's "Download for Windows" button points at the stable URL
#   .../releases/latest/download/Arena-Armory-Setup.exe
# which always serves the newest release because the artifact name is
# versionless (version lives in the release tag and app metadata).
name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build renderer/main bundles
        run: npm run build

      - name: Package and publish installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
